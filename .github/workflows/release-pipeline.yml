name: Release Pipeline

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-pipeline-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  quality:
    uses: ./.github/workflows/quality-checks.yml

  playwright:
    uses: ./.github/workflows/playwright.yml

  release:
    needs: [quality, playwright]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: meta
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Chrome extension
        run: pnpm build

      - name: Build Firefox extension
        run: pnpm build:firefox

      - name: Zip extensions
        run: |
          pnpm zip
          pnpm zip:firefox

      - name: Prepare assets
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${{ steps.meta.outputs.version }}"

          mv ".output/clean-copy-$VERSION-chrome.zip" "clean-copy-chrome-$TAG.zip"
          mv ".output/clean-copy-$VERSION-firefox.zip" "clean-copy-firefox-$TAG.zip"

          sha256sum "clean-copy-chrome-$TAG.zip" > "clean-copy-chrome-$TAG.zip.sha256"
          sha256sum "clean-copy-firefox-$TAG.zip" > "clean-copy-firefox-$TAG.zip.sha256"

      - name: Upload zip artifacts (for publish job)
        uses: actions/upload-artifact@v4
        with:
          name: extension-zips
          path: |
            clean-copy-*.zip
            clean-copy-*.zip.sha256
          retention-days: 1

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" clean-copy-*.zip clean-copy-*.zip.sha256 --clobber
          else
            gh release create "$TAG" clean-copy-*.zip clean-copy-*.zip.sha256 \
              --title "$TAG" \
              --generate-notes \
              $PRERELEASE_FLAG
          fi

  publish:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download zip artifacts
        uses: actions/download-artifact@v4
        with:
          name: extension-zips

      - name: Submit to Chrome Web Store
        run: |
          pnpm wxt submit \
            --chrome-zip clean-copy-chrome-${{ needs.release.outputs.tag }}.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          CHROME_SKIP_SUBMIT_REVIEW: false
