name: Release Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to release from
        required: false
        default: main
      version:
        description: Version to release (defaults to package.json)
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name || github.event.inputs.version || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: meta
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${INPUT_VERSION:-$PACKAGE_VERSION}"
            VERSION="${VERSION#v}"
            TAG="v$VERSION"
          else
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create release tag (if manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Build Chrome extension
        run: pnpm build

      - name: Build Firefox extension
        run: pnpm build:firefox

      - name: Zip both extensions
        run: |
          pnpm zip
          pnpm zip:firefox

      - name: Prepare assets
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${{ steps.meta.outputs.version }}"

          mv ".output/clean-copy-$VERSION-chrome.zip" "clean-copy-chrome-$TAG.zip"
          mv ".output/clean-copy-$VERSION-firefox.zip" "clean-copy-firefox-$TAG.zip"

          sha256sum "clean-copy-chrome-$TAG.zip" > "clean-copy-chrome-$TAG.zip.sha256"
          sha256sum "clean-copy-firefox-$TAG.zip" > "clean-copy-firefox-$TAG.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages
          path: |
            clean-copy-*.zip
            clean-copy-*.zip.sha256

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" clean-copy-*.zip clean-copy-*.zip.sha256 --clobber
          else
            gh release create "$TAG" clean-copy-*.zip clean-copy-*.zip.sha256 \
              --title "$TAG" \
              --generate-notes \
              $PRERELEASE_FLAG
          fi
